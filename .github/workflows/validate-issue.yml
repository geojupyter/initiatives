name: "Validate issue"

on:
  issues:
    types:
      - "opened"
      - "reopened"
      - "edited"
      - "labeled"

concurrency:
  group: "validate-issue-${{ github.event.issue.number }}"
  cancel-in-progress: true

jobs:
  validate-issue:
    name: "Validate issue"
    runs-on: "ubuntu-latest"
    if: "contains(github.event.issue.labels.*.name, 'type: initiative')"
    permissions:
      issues: "write"
    steps:
    - uses: "actions/checkout@v6"

    - name: "Install uv"
      uses: "astral-sh/setup-uv@v7"
      with:
        enable-cache: true

    - name: "Setup dependencies"
      run: "uv run --no-dev .github/issue_validator.py"
      env:
        GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        GITHUB_ISSUE_NUMBER: "${{ github.event.issue.number }}"
